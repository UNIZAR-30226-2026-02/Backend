services:

  # ──────────────────────────────────────────────
  #  PostgreSQL
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: files
    restart: unless-stopped
    environment:
      POSTGRES_DB: clasified_files
      POSTGRES_USER: red_panda_us
      POSTGRES_PASSWORD: red_panda_passw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data # persistencia
      # Mapeamos tus archivos locales y forzamos el orden de ejecución (01 y 02):
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./triggers.sql:/docker-entrypoint-initdb.d/02-triggers.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U red_panda_us -d clasified_files" ]
      interval: 10s
      timeout: 5s
      retries: 5

