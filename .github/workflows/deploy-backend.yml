name: Desplegar Backend en Azure

# El flujo se activará automáticamente al hacer un "push" a la rama "main"
on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub si quieres

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar código
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Compilar proyecto con Maven
      working-directory: ./codenames
      run: mvn clean package -DskipTests

    - name: Desplegar en Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'CodenamesWeb'
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: '${{ github.workspace }}/codenames/target/*.jar'